---
layout: default
title: daoist
pagination:
  enabled: true
---
<div class="wrapper">
	{% for post in site.posts %}
		<div class="posts">
			<h2> <a href="{{ post.url }}" title="{{ post.title }}">{{ post.title }}</a></h2>
			<small><span>{{ post.date | date_to_string }}</span> by <span>Daoist</span></small>
			<div>
				<p>{{ post.summary }}</p>
				<a href="{{ post.url }}"  title="{{ post.title }}"><strong>阅读全文...</strong></a>
			</div>
		</div>
	{% endfor %}
</div>
